name: Deploy Frontend Web (React SPA) to AWS

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "services/frontend_react/**"
      - ".github/config/aws.*.env"
      - ".github/workflows/deploy-frontend-web-aws.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ap-northeast-1
  NODE_VERSION: "24"
  PULUMI_PYTHON_VERSION: "3.13"

concurrency:
  group: deploy-frontend-web-aws-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy React SPA to S3/CloudFront
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "env_name=$ENV" >> $GITHUB_OUTPUT
          echo "📦 Deploying to: $ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python (Pulumi)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PULUMI_PYTHON_VERSION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Pulumi Python Dependencies
        run: |
          cd infrastructure/pulumi/aws
          pip install -r requirements.txt

      - name: Get Pulumi Outputs
        id: pulumi
        run: |
          cd infrastructure/pulumi/aws
          STACK="${{ steps.env.outputs.env_name }}"
          pulumi login
          pulumi stack select "$STACK"
          echo "api_url=$(pulumi stack output api_gateway_endpoint)"         >> $GITHUB_OUTPUT
          echo "bucket=$(pulumi stack output frontend_bucket_name)"          >> $GITHUB_OUTPUT
          echo "cf_id=$(pulumi stack output cloudfront_distribution_id 2>/dev/null || echo '')"     >> $GITHUB_OUTPUT
          echo "cf_domain=$(pulumi stack output cloudfront_domain 2>/dev/null || echo '')"          >> $GITHUB_OUTPUT
          echo "frontend_url=$(pulumi stack output frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(pulumi stack output cognito_domain)"        >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(pulumi stack output cognito_client_id)"  >> $GITHUB_OUTPUT
          echo "user_pool_id=$(pulumi stack output cognito_user_pool_id)"    >> $GITHUB_OUTPUT
          echo "custom_domain=$(pulumi stack output custom_domain 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/frontend_react/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend_react
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi

      - name: Build React SPA
        working-directory: services/frontend_react
        run: |
          CF_DOMAIN="${{ steps.pulumi.outputs.cf_domain }}"
          CUSTOM_DOMAIN="${{ steps.pulumi.outputs.custom_domain }}"
          FRONTEND_URL="${{ steps.pulumi.outputs.frontend_url }}"
          # Determine public origin: custom domain > CloudFront > S3 website
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            PUBLIC_ORIGIN="https://${CUSTOM_DOMAIN}"
          elif [[ -n "$CF_DOMAIN" ]]; then
            PUBLIC_ORIGIN="https://${CF_DOMAIN}"
          else
            PUBLIC_ORIGIN="${FRONTEND_URL%/}"  # strip trailing slash
          fi
          VITE_BASE_PATH=/sns/ \
          VITE_API_URL="${{ steps.pulumi.outputs.api_url }}" \
          VITE_AUTH_PROVIDER=aws \
          VITE_COGNITO_DOMAIN="${{ steps.pulumi.outputs.cognito_domain }}.auth.${{ env.AWS_REGION }}.amazoncognito.com" \
          VITE_COGNITO_CLIENT_ID="${{ steps.pulumi.outputs.cognito_client_id }}" \
          VITE_COGNITO_REDIRECT_URI="${PUBLIC_ORIGIN}/sns/auth/callback" \
          VITE_COGNITO_LOGOUT_URI="${PUBLIC_ORIGIN}/sns/" \
          npm run build
          echo "✅ Build complete ($(du -sh dist | cut -f1))"

      - name: Deploy to S3
        run: |
          BUCKET="${{ steps.pulumi.outputs.bucket }}"
          aws s3 sync services/frontend_react/dist/ s3://${BUCKET}/sns/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html は短いキャッシュ
          aws s3 cp services/frontend_react/dist/index.html \
            s3://${BUCKET}/sns/index.html \
            --cache-control "public, max-age=300" \
            --content-type "text/html"
          echo "✅ Deployed to s3://${BUCKET}/sns/"

      - name: Update Cognito Callback URLs
        run: |
          CF_DOMAIN="${{ steps.pulumi.outputs.cf_domain }}"
          CUSTOM_DOMAIN="${{ steps.pulumi.outputs.custom_domain }}"
          FRONTEND_URL="${{ steps.pulumi.outputs.frontend_url }}"
          USER_POOL_ID="${{ steps.pulumi.outputs.user_pool_id }}"
          CLIENT_ID="${{ steps.pulumi.outputs.cognito_client_id }}"

          # ベース URL リスト (常に含める)
          CALLBACK_URLS="http://localhost:8080/callback https://localhost:8080/callback http://localhost:5173/sns/auth/callback"
          LOGOUT_URLS="http://localhost:8080/ https://localhost:8080/ http://localhost:5173/sns/"

          # CloudFront ドメインがある場合は追加
          if [[ -n "$CF_DOMAIN" ]]; then
            CALLBACK_URLS="$CALLBACK_URLS https://${CF_DOMAIN}/sns/auth/callback"
            LOGOUT_URLS="$LOGOUT_URLS https://${CF_DOMAIN}/sns/"
          fi

          # カスタムドメインが設定されている場合は追加
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            CALLBACK_URLS="$CALLBACK_URLS https://${CUSTOM_DOMAIN}/sns/auth/callback"
            LOGOUT_URLS="$LOGOUT_URLS https://${CUSTOM_DOMAIN}/sns/"
            echo "🌐 Custom domain callback URLs added: https://${CUSTOM_DOMAIN}/sns/auth/callback"
          fi

          # CloudFront/カスタムドメインがない場合 (staging) は S3 website URL を使用
          # ただし S3 website は HTTP のため Cognito は HTTP redirect URI を拒否する。
          # CDN なし staging では localhost のみを Cognito に登録する (テスト用途として十分)。
          if [[ -z "$CF_DOMAIN" && -z "$CUSTOM_DOMAIN" && -n "$FRONTEND_URL" ]]; then
            S3_BASE="${FRONTEND_URL%/}"
            if [[ "$S3_BASE" == https://* ]]; then
              CALLBACK_URLS="$CALLBACK_URLS ${S3_BASE}/sns/auth/callback"
              LOGOUT_URLS="$LOGOUT_URLS ${S3_BASE}/sns/"
              echo "📦 S3 website callback URLs added: ${S3_BASE}/sns/auth/callback"
            else
              echo "⚠️  S3 website URL is HTTP (${S3_BASE}) - skipping Cognito registration (HTTP not allowed). Use localhost for testing."
            fi
          fi

          aws cognito-idp update-user-pool-client \
            --user-pool-id "$USER_POOL_ID" \
            --client-id "$CLIENT_ID" \
            --region ${{ env.AWS_REGION }} \
            --supported-identity-providers "COGNITO" \
            --allowed-o-auth-flows "code" "implicit" \
            --allowed-o-auth-scopes "email" "openid" "profile" \
            --allowed-o-auth-flows-user-pool-client \
            --callback-urls $CALLBACK_URLS \
            --logout-urls $LOGOUT_URLS \
            --no-cli-pager
          echo "✅ Cognito callback URLs updated"

      - name: Invalidate CloudFront Cache
        run: |
          CF_ID="${{ steps.pulumi.outputs.cf_id }}"
          if [[ -n "$CF_ID" ]]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_ID" \
              --paths "/sns*" \
              --no-cli-pager
            echo "✅ Invalidation issued for /sns*"
          else
            echo "⏭️ No CloudFront distribution — skipping invalidation"
          fi

      - name: Deployment Summary
        run: |
          CF_DOMAIN="${{ steps.pulumi.outputs.cf_domain }}"
          if [[ -n "$CF_DOMAIN" ]]; then
            echo "✅ Deployed to: https://${CF_DOMAIN}/sns/"
          else
            echo "✅ Deployed to: ${{ steps.pulumi.outputs.frontend_url }}sns/"
          fi
          if [[ -n "${{ steps.pulumi.outputs.custom_domain }}" ]]; then
            echo "   Custom Domain: https://${{ steps.pulumi.outputs.custom_domain }}/sns/"
          fi
          echo "   API URL   : ${{ steps.pulumi.outputs.api_url }}"
          echo "   S3 Bucket : ${{ steps.pulumi.outputs.bucket }}/sns/"
