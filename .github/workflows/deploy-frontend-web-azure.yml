name: Deploy Frontend Web (React SPA) to Azure

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "services/frontend_react/**"
      - ".github/config/azure.*.env"
      - ".github/workflows/deploy-frontend-web-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "24"

concurrency:
  group: deploy-frontend-web-azure-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy React SPA to Azure Blob/AFD
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "env_name=$ENV" >> $GITHUB_OUTPUT

          # Blob storage accounts (fixed per environment)
          if [ "$ENV" == "staging" ]; then
            echo "storage_account=mcadwebd45ihd" >> $GITHUB_OUTPUT
          else
            echo "storage_account=mcadwebdiev0w" >> $GITHUB_OUTPUT
          fi

          echo "rg=multicloud-auto-deploy-${ENV}-rg"          >> $GITHUB_OUTPUT
          echo "afd_profile=multicloud-auto-deploy-${ENV}-fd"  >> $GITHUB_OUTPUT
          echo "📦 Deploying to: $ENV"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Azure Auth Settings
        id: azure_auth
        run: |
          # Extract tenant_id from AZURE_CREDENTIALS JSON
          CREDS='${{ secrets.AZURE_CREDENTIALS }}'
          echo "tenant_id=$(echo $CREDS | jq -r '.tenantId')" >> $GITHUB_OUTPUT

          # AFD custom domain for redirect URIs
          RG="${{ steps.env.outputs.rg }}"
          PROFILE="${{ steps.env.outputs.afd_profile }}"
          HOSTNAME=$(az afd endpoint list \
            --profile-name "$PROFILE" \
            --resource-group "$RG" \
            --query '[0].hostName' -o tsv 2>/dev/null || echo "")
          echo "afd_hostname=${HOSTNAME}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/frontend_react/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend_react
        run: npm ci

      - name: Build React SPA
        working-directory: services/frontend_react
        env:
          VITE_BASE_PATH: /sns/
          # Required secret: AZURE_API_ENDPOINT (per GitHub environment)
          # e.g. https://multicloud-auto-deploy-staging-api.azurewebsites.net
          VITE_API_URL: ${{ secrets.AZURE_API_ENDPOINT }}
          VITE_AUTH_PROVIDER: azure
          VITE_AZURE_TENANT_ID: ${{ steps.azure_auth.outputs.tenant_id }}
          # Required secret: AZURE_AD_CLIENT_ID (Azure AD app registration client ID for frontend)
          VITE_AZURE_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          VITE_AZURE_REDIRECT_URI: https://${{ steps.azure_auth.outputs.afd_hostname }}/sns/auth/callback
          VITE_AZURE_LOGOUT_URI: https://${{ steps.azure_auth.outputs.afd_hostname }}/sns/
        run: |
          npm run build
          echo "✅ Build complete ($(du -sh dist | cut -f1))"

      - name: Deploy to Azure Blob Storage
        run: |
          STORAGE="${{ steps.env.outputs.storage_account }}"
          RG="${{ steps.env.outputs.rg }}"

          # ストレージアカウントキーを取得（Blob Data ロール不要、listKeys権限で可能）
          ACCOUNT_KEY=$(az storage account keys list \
            --account-name "$STORAGE" \
            --resource-group "$RG" \
            --query '[0].value' -o tsv)

          # assets (長期キャッシュ・immutable)
          az storage blob upload-batch \
            --account-name "$STORAGE" \
            --account-key "$ACCOUNT_KEY" \
            --destination '$web/sns' \
            --source services/frontend_react/dist/ \
            --pattern "assets/*" \
            --content-cache-control "public, max-age=31536000, immutable" \
            --overwrite true

          # index.html (短期キャッシュ)
          az storage blob upload-batch \
            --account-name "$STORAGE" \
            --account-key "$ACCOUNT_KEY" \
            --destination '$web/sns' \
            --source services/frontend_react/dist/ \
            --pattern "*.html" \
            --content-cache-control "public, max-age=300" \
            --content-type "text/html" \
            --overwrite true

          # その他ファイル (svg等)
          az storage blob upload-batch \
            --account-name "$STORAGE" \
            --account-key "$ACCOUNT_KEY" \
            --destination '$web/sns' \
            --source services/frontend_react/dist/ \
            --pattern "*.svg" \
            --content-cache-control "public, max-age=3600" \
            --overwrite true

          echo "✅ Deployed to blob: ${STORAGE}/\$web/sns/"

      - name: Purge AFD Cache
        run: |
          RG="${{ steps.env.outputs.rg }}"
          PROFILE="${{ steps.env.outputs.afd_profile }}"
          # AFD プロファイル自体が存在しない場合 (staging などCDNなし) はスキップ
          if ! az afd profile show --profile-name "$PROFILE" --resource-group "$RG" >/dev/null 2>&1; then
            echo "⚠️ AFD profile '$PROFILE' not found, skipping purge (CDN-less environment)"
            exit 0
          fi
          ENDPOINT=$(az afd endpoint list \
            --profile-name "$PROFILE" \
            --resource-group "$RG" \
            --query '[0].name' -o tsv)
          if [ -z "$ENDPOINT" ]; then
            echo "⚠️ AFD endpoint not found, skipping purge"
            exit 0
          fi
          HOSTNAME=$(az afd endpoint show \
            --profile-name "$PROFILE" \
            --resource-group "$RG" \
            --endpoint-name "$ENDPOINT" \
            --query 'hostName' -o tsv)
          az afd endpoint purge \
            --profile-name "$PROFILE" \
            --resource-group "$RG" \
            --endpoint-name "$ENDPOINT" \
            --content-paths '/sns' '/sns/' '/sns/*' \
            --domains "$HOSTNAME"
          echo "✅ AFD cache purged for /sns*"

      - name: Deployment Summary
        run: |
          RG="${{ steps.env.outputs.rg }}"
          PROFILE="${{ steps.env.outputs.afd_profile }}"
          HOSTNAME=$(az afd endpoint list \
            --profile-name "$PROFILE" \
            --resource-group "$RG" \
            --query '[0].hostName' -o tsv 2>/dev/null || echo "(see AFD portal)")
          echo "✅ Deployed to: https://${HOSTNAME}/sns/"
          echo "   Blob Storage: ${{ steps.env.outputs.storage_account }}/\$web/sns/"
