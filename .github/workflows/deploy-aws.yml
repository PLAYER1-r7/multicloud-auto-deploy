name: Deploy to AWS

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "services/api/**"
      - "infrastructure/pulumi/aws/**"
      - ".github/config/aws.*.env"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ap-northeast-1
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.13"

# Prevent concurrent Pulumi updates on the same stack (causes ResourceConflictException)
concurrency:
  group: deploy-aws-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # develop→staging, main→production, 手動→選択した環境
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Pulumi Python Dependencies
        run: |
          cd infrastructure/pulumi/aws
          pip install -r requirements.txt

      - name: Determine Pulumi Stack Name
        id: set_stack
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            STACK_NAME="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            STACK_NAME="production"
          else
            STACK_NAME="staging"
          fi
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          echo "📦 Using Pulumi stack: $STACK_NAME"

      - name: Load Cloud Config
        # Single source of truth for stable per-environment values.
        # eliminates dependency on gitignored Pulumi.*.yaml and repo-level secrets.
        id: cloud_config
        run: |
          STACK_NAME="${{ steps.set_stack.outputs.stack_name }}"
          CONFIG_FILE=".github/config/aws.${STACK_NAME}.env"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file $CONFIG_FILE not found — cannot proceed"
            exit 1
          fi
          source "$CONFIG_FILE"
          echo "📄 Loaded config: $CONFIG_FILE"
          echo "  custom_domain=$CLOUD_CUSTOM_DOMAIN"
          echo "  cloudfront_domain=$CLOUD_CLOUDFRONT_DOMAIN"
          echo "custom_domain=$CLOUD_CUSTOM_DOMAIN" >> $GITHUB_OUTPUT
          echo "acm_cert_arn=$CLOUD_ACM_CERT_ARN" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$CLOUD_CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$CLOUD_CLOUDFRONT_DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Initialize Pulumi Stack
        run: |
          cd infrastructure/pulumi/aws
          pulumi login
          pulumi stack select ${{ steps.set_stack.outputs.stack_name }} 2>/dev/null || pulumi stack init ${{ steps.set_stack.outputs.stack_name }}
          pulumi config set aws:region ${{ env.AWS_REGION }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Sync Pulumi Config (custom domain + ACM cert)
        run: |
          cd infrastructure/pulumi/aws
          STACK_NAME="${{ steps.set_stack.outputs.stack_name }}"
          STACK_FILE="Pulumi.${STACK_NAME}.yaml"

          # Read config from committed Pulumi YAML (single source of truth).
          # Previously this step read from GitHub Secrets (AWS_CUSTOM_DOMAIN etc.),
          # which caused production to inherit the staging custom domain when the
          # repo-level secret was set to staging.aws.ashnova.jp.
          # Fix: always read customDomain / acmCertificateArn / cloudFrontDomain
          # from the committed Pulumi.<stack>.yaml — no secrets needed.
          # Read from committed config file (Pulumi.*.yaml is gitignored and unavailable in CI)
          CUSTOM_DOMAIN="${{ steps.cloud_config.outputs.custom_domain }}"
          ACM_CERT_ARN="${{ steps.cloud_config.outputs.acm_cert_arn }}"
          CF_DOMAIN="${{ steps.cloud_config.outputs.cloudfront_domain }}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "✅ Setting customDomain = $CUSTOM_DOMAIN"
            pulumi config set multicloud-auto-deploy-aws:customDomain "$CUSTOM_DOMAIN"
          else
            echo "⚠️  customDomain not set in $STACK_FILE — skipping"
          fi
          if [ -n "$ACM_CERT_ARN" ]; then
            echo "✅ Setting acmCertificateArn"
            pulumi config set multicloud-auto-deploy-aws:acmCertificateArn "$ACM_CERT_ARN"
          else
            echo "⚠️  acmCertificateArn not set in $STACK_FILE — skipping"
          fi
          if [ -n "$CF_DOMAIN" ]; then
            echo "✅ Setting cloudFrontDomain = $CF_DOMAIN"
            pulumi config set multicloud-auto-deploy-aws:cloudFrontDomain "$CF_DOMAIN"
          else
            echo "⚠️  cloudFrontDomain not set in $STACK_FILE — skipping"
          fi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Remove stuck obsolete resources from Pulumi state
        run: |
          cd infrastructure/pulumi/aws
          STACK="${{ steps.set_stack.outputs.stack_name }}"
          # These landing-* resources were removed from code but remain in state.
          # Pulumi tries to delete them on every up, but fails:
          #   landing-oai: IAM permission denied (cloudfront:DeleteCloudFrontOriginAccessIdentity)
          #   landing-bucket: BucketNotEmpty
          # Removing from state retains AWS resources but stops Pulumi tracking them.
          pulumi state delete \
            "urn:pulumi:${STACK}::multicloud-auto-deploy-aws::aws:cloudfront/originAccessIdentity:OriginAccessIdentity::landing-oai" \
            --force --yes 2>/dev/null || echo "landing-oai not in state"
          pulumi state delete \
            "urn:pulumi:${STACK}::multicloud-auto-deploy-aws::aws:s3/bucket:Bucket::landing-bucket" \
            --force --yes 2>/dev/null || echo "landing-bucket not in state"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Refresh Pulumi State (sync with actual AWS resources)
        run: |
          cd infrastructure/pulumi/aws
          # Detect and fix state drift (e.g. CloudFront distribution replaced outside Pulumi)
          pulumi refresh --yes --skip-preview 2>&1 | tail -20
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Deploy Infrastructure with Pulumi
        id: pulumi
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: ${{ steps.set_stack.outputs.stack_name }}
          work-dir: infrastructure/pulumi/aws
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Get Pulumi Outputs
        id: pulumi_outputs
        run: |
          cd infrastructure/pulumi/aws
          echo "lambda_function_name=$(pulumi stack output lambda_function_name)" >> $GITHUB_OUTPUT
          echo "api_gateway_endpoint=$(pulumi stack output api_gateway_endpoint)" >> $GITHUB_OUTPUT
          echo "frontend_bucket_name=$(pulumi stack output frontend_bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$(pulumi stack output cloudfront_domain)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(pulumi stack output cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "custom_domain=$(pulumi stack output custom_domain 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$(pulumi stack output cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(pulumi stack output cognito_client_id)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(pulumi stack output cognito_domain)" >> $GITHUB_OUTPUT
          echo "posts_table_name=$(pulumi stack output posts_table_name)" >> $GITHUB_OUTPUT
          echo "images_bucket_name=$(pulumi stack output images_bucket_name)" >> $GITHUB_OUTPUT
          echo "secret_name=$(pulumi stack output secret_name)" >> $GITHUB_OUTPUT
          echo "acm_certificate_arn=$(pulumi stack output acm_certificate_arn 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Ensure CloudFront alias + ACM cert (post-Pulumi safety net)
        run: |
          CD="${{ steps.pulumi_outputs.outputs.cloudfront_distribution_id }}"
          CUSTOM_DOMAIN="${{ steps.pulumi_outputs.outputs.custom_domain }}"
          STACK_NAME="${{ steps.set_stack.outputs.stack_name }}"
          ACM_CERT_ARN="${{ steps.cloud_config.outputs.acm_cert_arn }}"

          if [[ -z "$CUSTOM_DOMAIN" || -z "$ACM_CERT_ARN" || -z "$CD" ]]; then
            echo "⏭️  No custom domain or ACM cert configured — skipping alias check"
            exit 0
          fi

          CURRENT_ALIAS=$(aws cloudfront get-distribution --id "$CD" \
            --query 'Distribution.DistributionConfig.Aliases.Items[0]' --output text 2>/dev/null || echo "None")
          if [[ "$CURRENT_ALIAS" == "$CUSTOM_DOMAIN" ]]; then
            echo "✅ CloudFront alias already set to $CUSTOM_DOMAIN — no action needed"
            exit 0
          fi

          echo "⚠️  CloudFront alias is '$CURRENT_ALIAS' (expected '$CUSTOM_DOMAIN') — restoring..."
          ETAG=$(aws cloudfront get-distribution-config --id "$CD" --query 'ETag' --output text)
          aws cloudfront get-distribution-config --id "$CD" --query 'DistributionConfig' --output json > /tmp/cf-dist.json
          # Replace Python heredoc with jq to avoid YAML block scalar parsing issues
          # (same fix pattern applied to deploy-gcp.yml: "Python heredoc が YAML block scalar を壊す")
          jq --arg domain "$CUSTOM_DOMAIN" --arg cert "$ACM_CERT_ARN" '
            .Aliases = {"Quantity": 1, "Items": [$domain]} |
            .ViewerCertificate = {
              "ACMCertificateArn": $cert,
              "SSLSupportMethod": "sni-only",
              "MinimumProtocolVersion": "TLSv1.2_2021",
              "CertificateSource": "acm"
            } |
            del(.ViewerCertificate.CloudFrontDefaultCertificate)
          ' /tmp/cf-dist.json > /tmp/cf-dist-updated.json && mv /tmp/cf-dist-updated.json /tmp/cf-dist.json
          aws cloudfront update-distribution --id "$CD" --if-match "$ETAG" \
            --distribution-config file:///tmp/cf-dist.json \
            --query 'Distribution.{Status:Status,Aliases:DistributionConfig.Aliases.Items}' \
            --output json
          echo "✅ CloudFront alias + ACM cert restored for $CUSTOM_DOMAIN"

      - name: Ensure Cognito callback URLs (post-Pulumi safety net)
        run: |
          USER_POOL_ID="${{ steps.pulumi_outputs.outputs.cognito_user_pool_id }}"
          CLIENT_ID="${{ steps.pulumi_outputs.outputs.cognito_client_id }}"
          CUSTOM_DOMAIN="${{ steps.pulumi_outputs.outputs.custom_domain }}"
          CF_DOMAIN="${{ steps.pulumi_outputs.outputs.cloudfront_domain }}"

          if [[ -z "$USER_POOL_ID" || -z "$CLIENT_ID" ]]; then
            echo "⏭️  No Cognito pool/client — skipping"
            exit 0
          fi

          # Build required callback URLs
          REQUIRED_CALLBACK="https://${CUSTOM_DOMAIN}/sns/auth/callback"
          CURRENT=$(aws cognito-idp describe-user-pool-client \
            --user-pool-id "$USER_POOL_ID" --client-id "$CLIENT_ID" \
            --query 'UserPoolClient.CallbackURLs' --output json)

          if echo "$CURRENT" | grep -q "$REQUIRED_CALLBACK"; then
            echo "✅ Cognito callback URL already includes $REQUIRED_CALLBACK"
            exit 0
          fi

          echo "⚠️  Cognito callback URL missing $REQUIRED_CALLBACK — restoring..."
          # Build merged callback URL list using jq (avoids multi-line Python heredoc that breaks YAML parsing)
          CALLBACK_URLS=$(echo "$CURRENT" | jq -r --arg d "$CUSTOM_DOMAIN" --arg c "$CF_DOMAIN" \
            '(["http://localhost:5173/sns/auth/callback", "https://\($d)/sns/auth/callback"] + (if ($c != "" and $c != $d) then ["https://\($c)/sns/auth/callback"] else [] end) + .) | reduce .[] as $u ([]; if (. | index($u)) then . else . + [$u] end) | join(" ")')
          LOGOUT_URLS="http://localhost:5173/sns/ https://${CUSTOM_DOMAIN}/sns/"

          aws cognito-idp update-user-pool-client \
            --user-pool-id "$USER_POOL_ID" \
            --client-id "$CLIENT_ID" \
            --callback-urls $CALLBACK_URLS \
            --logout-urls $LOGOUT_URLS \
            --allowed-o-auth-flows "code" \
            --allowed-o-auth-scopes "email" "openid" "profile" \
            --supported-identity-providers "COGNITO" \
            --allowed-o-auth-flows-user-pool-client \
            --query 'UserPoolClient.CallbackURLs' --output json
          echo "✅ Cognito callback URLs restored"

      - name: Build and Deploy Frontend
        run: |
          FRONTEND_BUCKET="${{ steps.pulumi_outputs.outputs.frontend_bucket_name }}"
          CLOUDFRONT_ID="${{ steps.pulumi_outputs.outputs.cloudfront_distribution_id }}"
          COGNITO_DOMAIN="${{ steps.pulumi_outputs.outputs.cognito_domain }}"
          COGNITO_CLIENT_ID="${{ steps.pulumi_outputs.outputs.cognito_client_id }}"
          API_URL="${{ steps.pulumi_outputs.outputs.api_gateway_endpoint }}"
          CLOUDFRONT_DOMAIN="${{ steps.pulumi_outputs.outputs.cloudfront_domain }}"
          CUSTOM_DOMAIN="${{ steps.pulumi_outputs.outputs.custom_domain }}"

          # Determine the public URL (prefer custom domain if set)
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            PUBLIC_ORIGIN="https://${CUSTOM_DOMAIN}"
          else
            PUBLIC_ORIGIN="https://${CLOUDFRONT_DOMAIN}"
          fi

          echo "🏗️  Building React frontend for AWS (Cognito auth)..."
          cd services/frontend_react

          npm ci --prefer-offline

          VITE_AUTH_PROVIDER=aws \
          VITE_API_URL="${API_URL}" \
          VITE_COGNITO_DOMAIN="${COGNITO_DOMAIN}.auth.${{ env.AWS_REGION }}.amazoncognito.com" \
          VITE_COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
          VITE_COGNITO_REDIRECT_URI="${PUBLIC_ORIGIN}/sns/auth/callback" \
          VITE_COGNITO_LOGOUT_URI="${PUBLIC_ORIGIN}/sns/" \
          VITE_BASE_PATH=/sns/ \
          npm run build

          echo "✅ Frontend build complete. Uploading to S3..."
          cd ../..

          # Upload to S3 at sns/ prefix (CloudFront /sns* path pattern points here)
          aws s3 sync services/frontend_react/dist/ "s3://${FRONTEND_BUCKET}/sns/" \
            --delete \
            --region ${{ env.AWS_REGION }}

          # Invalidate CloudFront cache for sns/ paths
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_ID \
            --paths "/sns/*" \
            --region us-east-1

          echo "✅ Frontend deployed to S3 and CloudFront cache invalidated"
          echo "🌐 Frontend URL: ${PUBLIC_ORIGIN}/sns/"

      - name: Build Lambda Layer
        id: build_layer
        run: |
          cd services/api
          rm -rf .build-layer lambda-layer.zip

          # Build Lambda Layer (dependencies only)
          echo "📦 Building Lambda Layer (dependencies)..."
          bash ../../scripts/build-lambda-layer.sh

          # Capture layer info for subsequent steps
          if [ -f lambda-layer.zip ]; then
            LAYER_SIZE=$(du -h lambda-layer.zip | cut -f1)
            echo "✅ Layer package created: $LAYER_SIZE"
            ls -lh lambda-layer.zip

            # Export for GitHub Actions
            echo "layer_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Layer package creation failed"
            exit 1
          fi

      - name: Package Backend (Application Code Only)
        run: |
          cd services/api
          rm -rf .build lambda.zip
          mkdir -p .build/package

          # Copy application code only (no dependencies - they're in the Layer)
          echo "📁 Copying application code..."
          cp -r app .build/package/
          cp index.py .build/package/

          # Create zip (application code only - lightweight!)
          echo "🗜️  Creating lambda package (code only)..."
          cd .build/package
          zip -r ../../lambda.zip .
          cd ../..

          # Show package info
          echo "✅ Package created:"
          ls -lh lambda.zip
          SIZE_MB=$(du -m lambda.zip | cut -f1)
          echo "📊 Package size: ${SIZE_MB}MB"

          if [ $SIZE_MB -lt 50 ]; then
            echo "✅ Package is under 50MB - direct upload possible!"
            echo "use_direct_upload=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Package exceeds 50MB - will use S3"
            echo "use_direct_upload=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Lambda Layer
        id: deploy_layer
        run: |
          set -e

          LAYER_NAME="multicloud-auto-deploy-${{ steps.set_stack.outputs.stack_name }}-dependencies"
          LAYER_ZIP="services/api/lambda-layer.zip"

          # Validate ZIP file exists and is readable
          if [ ! -f "$LAYER_ZIP" ]; then
            echo "❌ Layer ZIP not found: $LAYER_ZIP"
            exit 1
          fi

          LAYER_SIZE=$(du -h "$LAYER_ZIP" | cut -f1)
          echo "📊 Layer size: $LAYER_SIZE"
          echo "🚀 Publishing Custom Lambda Layer: $LAYER_NAME"

          # Publish layer with error handling
          LAYER_VERSION_ARN=$(aws lambda publish-layer-version \
            --layer-name "$LAYER_NAME" \
            --description "Dependencies for FastAPI + Mangum + JWT (Python 3.13)" \
            --zip-file "fileb://$LAYER_ZIP" \
            --compatible-runtimes python3.13 \
            --region "${{ env.AWS_REGION }}" \
            --query 'LayerVersionArn' \
            --output text 2>&1) || {
            echo "❌ Failed to publish layer"
            echo "$LAYER_VERSION_ARN"
            exit 1
          }

          if [ -z "$LAYER_VERSION_ARN" ]; then
            echo "❌ Layer ARN is empty"
            exit 1
          fi

          echo "✅ Layer published: $LAYER_VERSION_ARN"
          echo "layer_arn=$LAYER_VERSION_ARN" >> $GITHUB_OUTPUT

      - name: Cleanup Old Lambda Layer Versions
        continue-on-error: true
        run: |
          set +e  # Continue even if cleanup fails

          LAYER_NAME="multicloud-auto-deploy-${{ steps.set_stack.outputs.stack_name }}-dependencies"
          echo "🧹 Cleaning up old Lambda Layer versions (keeping latest 3) for: $LAYER_NAME"

          # Get layer versions (suppress errors if layer doesn't exist yet)
          VERSIONS=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region "${{ env.AWS_REGION }}" \
            --query "LayerVersions[].Version" \
            --output text 2>/dev/null) || true

          if [ -z "$VERSIONS" ]; then
            echo "ℹ️  No versions found — skipping cleanup"
            exit 0
          fi

          # Sort and delete old versions (keep latest 3)
          SORTED=$(echo "$VERSIONS" | tr ' ' '\n' | sort -rn | tail -n +4)
          DELETED_COUNT=0

          for v in $SORTED; do
            if aws lambda delete-layer-version \
              --layer-name "$LAYER_NAME" \
              --version-number "$v" \
              --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
              echo "  ✓ Deleted v$v"
              ((DELETED_COUNT++))
            else
              echo "  ⚠️  Could not delete v$v (skipped)"
            fi
          done

          REMAINING=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region "${{ env.AWS_REGION }}" \
            --query "length(LayerVersions)" \
            --output text 2>/dev/null || echo "?")

          echo "✅ Cleanup done ($DELETED_COUNT deleted). Remaining versions: $REMAINING"

      - name: Update Lambda Function
        id: update_lambda
        run: |
          set -e
          LAMBDA_FUNCTION="${{ steps.pulumi_outputs.outputs.lambda_function_name }}"

          # Use custom Lambda Layer (optimized, no Klayers)
          echo "🔧 Using custom Lambda Layer"
          LAYER_ARNS="${{ steps.deploy_layer.outputs.layer_arn }}"

          # Wait for any Pulumi-triggered updates to complete before touching this Lambda
          # (Pulumi up just ran and may have updated the Lambda's environment/configuration)
          echo "⏳ Waiting for Lambda to be ready (Pulumi may still be updating it)..."
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda ready"

          # Debug: Check lambda.zip exists and show size
          echo "📦 Checking lambda.zip..."
          ls -lh services/api/lambda.zip || { echo "❌ lambda.zip not found!"; exit 1; }

          SIZE_MB=$(du -m services/api/lambda.zip | cut -f1)

          if [ $SIZE_MB -lt 50 ]; then
            # Direct upload (faster!)
            echo "🚀 Direct upload to Lambda (${SIZE_MB}MB < 50MB)"
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --region ${{ env.AWS_REGION }} \
              --zip-file fileb://services/api/lambda.zip \
              --output json || { echo "❌ Lambda update failed!"; exit 1; }
          else
            # S3 upload for large packages
            S3_BUCKET="${{ steps.pulumi_outputs.outputs.frontend_bucket_name }}"
            S3_KEY="lambda-deployments/lambda-$(date +%Y%m%d-%H%M%S).zip"

            echo "☁️  Uploading to S3: s3://$S3_BUCKET/$S3_KEY"
            aws s3 cp services/api/lambda.zip s3://$S3_BUCKET/$S3_KEY || { echo "❌ S3 upload failed!"; exit 1; }

            echo "🚀 Updating Lambda from S3"
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --region ${{ env.AWS_REGION }} \
              --s3-bucket $S3_BUCKET \
              --s3-key $S3_KEY \
              --output json || { echo "❌ Lambda update failed!"; exit 1; }
          fi

          # Wait for code update to complete before modifying configuration
          echo "⏳ Waiting for Lambda code update to stabilize..."
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda ready for configuration update"

          # Get CloudFront domain for CORS
          CLOUDFRONT_DOMAIN="${{ steps.pulumi_outputs.outputs.cloudfront_domain }}"
          CUSTOM_DOMAIN="${{ steps.pulumi_outputs.outputs.custom_domain }}"

          # Fallback: if Pulumi output is empty, use committed config file value
          if [[ -z "$CUSTOM_DOMAIN" ]]; then
            CUSTOM_DOMAIN="${{ steps.cloud_config.outputs.custom_domain }}"
            [[ -n "$CUSTOM_DOMAIN" ]] && echo "📄 CUSTOM_DOMAIN from cloud config: $CUSTOM_DOMAIN"
          fi

          # Include custom domain in CORS if set
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            CORS_ORIGINS="https://${CLOUDFRONT_DOMAIN},https://${CUSTOM_DOMAIN},http://localhost:5173"
          else
            CORS_ORIGINS="https://${CLOUDFRONT_DOMAIN},http://localhost:5173"
          fi

          echo "🔒 CORS Origins: $CORS_ORIGINS"

          # Create environment variables JSON to avoid escaping issues
          USER_POOL_ID="${{ steps.pulumi_outputs.outputs.cognito_user_pool_id }}"
          CLIENT_ID="${{ steps.pulumi_outputs.outputs.cognito_client_id }}"
          POSTS_TABLE="${{ steps.pulumi_outputs.outputs.posts_table_name }}"
          IMAGES_BUCKET="${{ steps.pulumi_outputs.outputs.images_bucket_name }}"
          SECRET_NAME="${{ steps.pulumi_outputs.outputs.secret_name }}"

          # Determine environment and auth settings
          DEPLOY_ENV="${{ steps.set_stack.outputs.stack_name }}"
          # Auth is always enabled: Cognito is configured for both staging and production.
          AUTH_DISABLED_VALUE="false"

          echo '{' > /tmp/lambda-env.json
          echo '  "Variables": {' >> /tmp/lambda-env.json
          echo '    "CLOUD_PROVIDER": "aws",' >> /tmp/lambda-env.json
          echo "    \"ENVIRONMENT\": \"$DEPLOY_ENV\"," >> /tmp/lambda-env.json
          echo "    \"AUTH_DISABLED\": \"$AUTH_DISABLED_VALUE\"," >> /tmp/lambda-env.json
          echo '    "AUTH_PROVIDER": "cognito",' >> /tmp/lambda-env.json
          echo "    \"AWS_COGNITO_USER_POOL_ID\": \"$USER_POOL_ID\"," >> /tmp/lambda-env.json
          echo "    \"AWS_COGNITO_CLIENT_ID\": \"$CLIENT_ID\"," >> /tmp/lambda-env.json
          echo "    \"COGNITO_REGION\": \"${{ env.AWS_REGION }}\"," >> /tmp/lambda-env.json
          echo "    \"POSTS_TABLE_NAME\": \"$POSTS_TABLE\"," >> /tmp/lambda-env.json
          echo "    \"IMAGES_BUCKET_NAME\": \"$IMAGES_BUCKET\"," >> /tmp/lambda-env.json
          echo "    \"SECRET_NAME\": \"$SECRET_NAME\"," >> /tmp/lambda-env.json
          echo "    \"TEXTRACT_REGION\": \"ap-northeast-2\"," >> /tmp/lambda-env.json
          echo "    \"BEDROCK_REGION\": \"us-east-1\"," >> /tmp/lambda-env.json
          echo "    \"BEDROCK_MODEL_ID\": \"amazon.nova-pro-v1:0\"," >> /tmp/lambda-env.json
          echo "    \"SOLVE_OCR_REVIEW_MIN_SCORE\": \"0.35\"," >> /tmp/lambda-env.json
          echo "    \"SOLVE_OCR_REVIEW_MAX_REPLACEMENT_RATIO\": \"0.01\"," >> /tmp/lambda-env.json
          echo "    \"CORS_ORIGINS\": \"$CORS_ORIGINS\"" >> /tmp/lambda-env.json
          echo '  }' >> /tmp/lambda-env.json
          echo '}' >> /tmp/lambda-env.json

          # Update configuration with environment variables and Layer(s)
          echo "🔗 Updating Lambda configuration..."
          aws lambda update-function-configuration \
            --function-name $LAMBDA_FUNCTION \
            --region ${{ env.AWS_REGION }} \
            --layers $LAYER_ARNS \
            --environment file:///tmp/lambda-env.json \
            --output json || { echo "❌ Lambda configuration update failed!"; exit 1; }

          echo "✅ Lambda function updated successfully with Layer(s) and environment variables"
          echo "api_endpoint=${{ steps.pulumi_outputs.outputs.api_gateway_endpoint }}" >> $GITHUB_OUTPUT

      - name: Notify Success
        if: success()
        run: |
          echo "✅ AWS deployment succeeded!"
          echo "📍 API Endpoint: ${{ steps.pulumi_outputs.outputs.api_gateway_endpoint }}"
          echo "🌐 Frontend: https://${{ steps.pulumi_outputs.outputs.cloudfront_domain }}/sns/"

      - name: Notify Failure
        if: failure()
        run: echo "❌ AWS deployment failed!"
