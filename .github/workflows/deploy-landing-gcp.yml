name: Deploy Landing Page to GCP

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "static-site/**"
      - ".github/workflows/deploy-landing-gcp.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ashnova
  GCP_REGION: asia-northeast1

jobs:
  deploy-landing:
    name: Deploy Landing Page to GCP Cloud Storage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine Environment
        id: env
        run: |
          # Use workflow_dispatch input if available, otherwise derive from branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "bucket_name=ashnova-multicloud-auto-deploy-production-frontend" >> $GITHUB_OUTPUT
            echo "url=https://www.gcp.ashnova.jp/" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "bucket_name=ashnova-multicloud-auto-deploy-staging-frontend" >> $GITHUB_OUTPUT
            echo "url=https://staging.gcp.ashnova.jp/" >> $GITHUB_OUTPUT
          fi
          echo "🌍 Deploying to: $ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Storage
        run: |
          gcloud storage cp static-site/*.html \
            gs://${{ steps.env.outputs.bucket_name }}/ \
            --cache-control="public, max-age=3600"

      - name: Set GCP-specific landing page as root index.html
        run: |
          # Deploy gcp/index.html as root index.html for Cloud CDN
          gcloud storage cp static-site/gcp/index.html \
            gs://${{ steps.env.outputs.bucket_name }}/index.html \
            --cache-control="public, max-age=3600"

      - name: Invalidate CDN Cache
        run: |
          # Dynamically look up the URL map name for the current environment
          ENV_SUFFIX="${{ steps.env.outputs.environment }}"
          URLMAP_NAME=$(gcloud compute url-maps list --format="value(name)" \
            --project=${{ secrets.GCP_PROJECT_ID }} | grep "cdn-urlmap" | grep "$ENV_SUFFIX" | head -1)
          # Fallback: any cdn-urlmap if env-specific not found
          if [ -z "$URLMAP_NAME" ]; then
            URLMAP_NAME=$(gcloud compute url-maps list --format="value(name)" \
              --project=${{ secrets.GCP_PROJECT_ID }} | grep "cdn-urlmap" | head -1)
          fi
          if [ -n "$URLMAP_NAME" ]; then
            gcloud compute url-maps invalidate-cdn-cache "$URLMAP_NAME" \
              --path "/*" --async --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || true
            echo "✅ CDN cache invalidated: $URLMAP_NAME"
          else
            echo "⚠️  No CDN URL map found, skipping cache invalidation"
          fi

      - name: Deployment Success
        run: |
          echo "✅ Landing page deployed to ${{ steps.env.outputs.environment }} successfully!"
          echo "🌐 URL: ${{ steps.env.outputs.url }}"
