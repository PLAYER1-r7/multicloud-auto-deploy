name: Deploy Landing Page to GCP

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "static-site/**"
      - ".github/workflows/deploy-landing-gcp.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ashnova
  GCP_REGION: asia-northeast1
  # Landing page is deployed to the same bucket as the frontend (root level)
  # so Cloud CDN serves it at / while the React SNS app lives under /sns/
  BUCKET_NAME: ashnova-multicloud-auto-deploy-staging-frontend

jobs:
  deploy-landing:
    name: Deploy Landing Page to GCP Cloud Storage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Storage
        run: |
          gcloud storage cp static-site/*.html gs://${{ env.BUCKET_NAME }}/ \
            --cache-control="public, max-age=3600"

      - name: Set GCP-specific landing page as root index.html
        run: |
          # Deploy gcp/index.html as root index.html for Cloud CDN
          gcloud storage cp static-site/gcp/index.html gs://${{ env.BUCKET_NAME }}/index.html \
            --cache-control="public, max-age=3600"

      - name: Invalidate CDN Cache
        run: |
          # Dynamically look up the URL map name for the current stack
          URLMAP_NAME=$(gcloud compute url-maps list --format="value(name)" \
            --project=${{ secrets.GCP_PROJECT_ID }} | grep "cdn-urlmap" | head -1)
          if [ -n "$URLMAP_NAME" ]; then
            gcloud compute url-maps invalidate-cdn-cache "$URLMAP_NAME" \
              --path "/*" --async --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || true
            echo "✅ CDN cache invalidated: $URLMAP_NAME"
          else
            echo "⚠️  No CDN URL map found, skipping cache invalidation"
          fi

      - name: Deployment Success
        run: |
          echo "✅ Landing page deployed successfully!"
          echo "🌐 URL: http://34.117.111.182/"
