name: Deploy Landing Page to Azure

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "static-site/**"
      - ".github/workflows/deploy-landing-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-landing:
    name: Deploy Landing Page to Azure Storage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          # Use workflow_dispatch input if available, otherwise derive from branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "storage_account=mcadwebdiev0w" >> $GITHUB_OUTPUT
            echo "resource_group=multicloud-auto-deploy-production-rg" >> $GITHUB_OUTPUT
            echo "afd_profile=multicloud-auto-deploy-production-fd" >> $GITHUB_OUTPUT
            echo "afd_endpoint=mcad-production-diev0w" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "storage_account=mcadwebd45ihd" >> $GITHUB_OUTPUT
            echo "resource_group=multicloud-auto-deploy-staging-rg" >> $GITHUB_OUTPUT
            echo "afd_profile=multicloud-auto-deploy-staging-fd" >> $GITHUB_OUTPUT
            echo "afd_endpoint=mcad-staging-d45ihd" >> $GITHUB_OUTPUT
          fi
          echo "🌍 Deploying to: $ENV"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Storage
        run: |
          echo "📤 Deploying landing page to ${{ steps.env.outputs.environment }} storage: ${{ steps.env.outputs.storage_account }}"
          az storage blob upload-batch \
            --account-name ${{ steps.env.outputs.storage_account }} \
            --auth-mode key \
            --destination '$web' \
            --source static-site/ \
            --pattern "*.html" \
            --overwrite \
            --content-cache-control "public, max-age=3600" \
            --content-type "text/html; charset=utf-8"

      - name: Purge Azure Front Door Cache
        run: |
          az afd endpoint purge \
            --profile-name ${{ steps.env.outputs.afd_profile }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --endpoint-name ${{ steps.env.outputs.afd_endpoint }} \
            --content-paths "/*"

      - name: Deployment Success
        run: |
          echo "✅ Landing page deployed successfully to ${{ steps.env.outputs.environment }}!"
