name: Project Management Sync

on:
  workflow_dispatch:
  schedule:
    # Daily 09:15 JST (00:15 UTC)
    - cron: "15 0 * * *"

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify gh CLI
        run: gh --version

      - name: Generate project management artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/agent_pm_sync.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- docs/generated/project-management/snapshot.json docs/generated/project-management/dashboard.md; then
            echo "ℹ️ No PM dashboard changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/generated/project-management/snapshot.json docs/generated/project-management/dashboard.md
          git commit -m "chore: daily project-management sync [skip ci] [skip-version-bump]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Project Management Sync" >> $GITHUB_STEP_SUMMARY
          echo "- Schedule: daily 09:15 JST (00:15 UTC)" >> $GITHUB_STEP_SUMMARY
          echo "- Output: docs/generated/project-management/snapshot.json" >> $GITHUB_STEP_SUMMARY
          echo "- Output: docs/generated/project-management/dashboard.md" >> $GITHUB_STEP_SUMMARY
