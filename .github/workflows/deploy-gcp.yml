name: Deploy to GCP

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "services/**"
      - "infrastructure/pulumi/gcp/**"
      - ".github/workflows/deploy-gcp.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  GCP_REGION: asia-northeast1
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.13"

# Prevent concurrent Pulumi updates on the same stack (causes 409 Conflict)
concurrency:
  group: deploy-gcp-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # develop→staging, main→production, 手動→選択した環境
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Install Pulumi Python Dependencies
        run: |
          cd infrastructure/pulumi/gcp
          pip install -r requirements.txt

      - name: Determine Pulumi Stack Name
        id: set_stack
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            STACK_NAME="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            STACK_NAME="production"
          else
            STACK_NAME="staging"
          fi
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          echo "📦 Using Pulumi stack: $STACK_NAME"

      - name: Load Cloud Config
        # Single source of truth for stable per-environment values.
        # Eliminates dependency on repo-level secrets and inline case/esac patterns.
        id: cloud_config
        run: |
          STACK_NAME="${{ steps.set_stack.outputs.stack_name }}"
          CONFIG_FILE=".github/config/gcp.${STACK_NAME}.env"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file $CONFIG_FILE not found — cannot proceed"
            exit 1
          fi
          source "$CONFIG_FILE"
          echo "📄 Loaded config: $CONFIG_FILE"
          echo "  custom_domain=$CLOUD_CUSTOM_DOMAIN"
          echo "custom_domain=$CLOUD_CUSTOM_DOMAIN" >> $GITHUB_OUTPUT

      - name: Initialize Pulumi Stack
        run: |
          cd infrastructure/pulumi/gcp
          pulumi login
          pulumi stack select ${{ steps.set_stack.outputs.stack_name }} 2>/dev/null || pulumi stack init ${{ steps.set_stack.outputs.stack_name }}
          pulumi config set gcp:project ${{ secrets.GCP_PROJECT_ID }}
          pulumi config set gcp:region asia-northeast1
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Remove SecretVersion from Pulumi state (IAM permission workaround)
        run: |
          cd infrastructure/pulumi/gcp
          STACK="${{ steps.set_stack.outputs.stack_name }}"
          # Remove SecretVersion from Pulumi state to prevent 403 on create/refresh
          # (Pulumi SA lacks secretmanager.versions.access permission)
          # This is idempotent: fails silently if resource is not in state
          pulumi state delete \
            "urn:pulumi:${STACK}::multicloud-auto-deploy-gcp::gcp:secretmanager/secretVersion:SecretVersion::app-secret-version" \
            --yes 2>/dev/null && echo "✅ Removed SecretVersion from state" || echo "✅ SecretVersion not in state (already clean)"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Refresh Pulumi State (sync with actual GCP resources)
        # Prevents 400/412 errors on ManagedSslCertificate and URLMap during pulumi up.
        # Known issue: GCP Pulumi state drift causes pulumi up to fail with
        #   "ManagedSslCertificate 400" or "URLMap 412 precondition failed"
        # pulumi refresh syncs the state to match actual GCP resource state before making changes.
        run: |
          cd infrastructure/pulumi/gcp
          pulumi refresh --yes --stack ${{ steps.set_stack.outputs.stack_name }} 2>/dev/null || echo "⚠️  pulumi refresh encountered warnings — proceeding with up"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Infrastructure with Pulumi
        id: pulumi
        # continue-on-error: GCP staging has a known state drift issue where ManagedSslCertificate
        # (400) and URLMap (412 precondition failed) cause pulumi up to fail. The existing
        # infrastructure (Cloud Run, GCS buckets, CDN) continues to work fine and pulumi stack
        # outputs are still valid. Subsequent steps (Cloud Run update, frontend deploy) should
        # proceed regardless of this known non-blocking Pulumi error.
        continue-on-error: true
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ steps.set_stack.outputs.stack_name }}
          work-dir: infrastructure/pulumi/gcp
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get Pulumi Outputs
        id: pulumi_outputs
        # Run even if Pulumi up failed (state drift) — stack outputs still valid for existing resources
        if: always()
        run: |
          cd infrastructure/pulumi/gcp
          echo "function_source_bucket=$(pulumi stack output function_source_bucket)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(pulumi stack output frontend_bucket)" >> $GITHUB_OUTPUT
          echo "function_name=$(pulumi stack output function_name)" >> $GITHUB_OUTPUT
          echo "cdn_ip_address=$(pulumi stack output cdn_ip_address)" >> $GITHUB_OUTPUT
          echo "uploads_bucket=$(pulumi stack output uploads_bucket)" >> $GITHUB_OUTPUT
          echo "compute_sa_email=$(pulumi stack output compute_sa_email)" >> $GITHUB_OUTPUT
          echo "custom_domain=$(pulumi stack output custom_domain 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Update Firebase Authorized Domains
        run: |
          CUSTOM_DOMAIN="${{ steps.cloud_config.outputs.custom_domain }}"
          if [ -z "$CUSTOM_DOMAIN" ]; then
            echo "⏭️  No custom domain configured, skipping Firebase domain registration"
            exit 0
          fi

          echo "🔐 Adding $CUSTOM_DOMAIN to Firebase authorized domains..."
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          TOKEN=$(gcloud auth print-access-token)

          # Get current authorized domains
          curl -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-user-project: $PROJECT" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/$PROJECT/config" \
            -o /tmp/fb_config.json

          # Build updated domains list (add custom domain if not already present)
          CURRENT_DOMAINS=$(jq -r '.authorizedDomains // [] | @json' /tmp/fb_config.json 2>/dev/null || echo "[]")
          if echo "$CURRENT_DOMAINS" | grep -q "\"$CUSTOM_DOMAIN\""; then
            echo "✅ $CUSTOM_DOMAIN already in Firebase authorized domains"
            NEW_DOMAINS="$CURRENT_DOMAINS"
          else
            NEW_DOMAINS=$(echo "$CURRENT_DOMAINS" | jq --arg d "$CUSTOM_DOMAIN" '. + [$d]')
            echo "➕ Adding $CUSTOM_DOMAIN to authorized domains"
          fi
          jq -n --argjson domains "$NEW_DOMAINS" '{"authorizedDomains": $domains}' > /tmp/fb_patch.json

          # Apply patch
          TOKEN=$(gcloud auth print-access-token)
          curl -s -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-user-project: $PROJECT" \
            -H "Content-Type: application/json" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/$PROJECT/config?updateMask=authorizedDomains" \
            -d @/tmp/fb_patch.json -o /tmp/fb_result.json

          if jq -e '.error' /tmp/fb_result.json > /dev/null 2>&1; then
            echo "❌ Error: $(jq -r '.error.message' /tmp/fb_result.json)"
            exit 1
          fi
          echo "✅ Firebase authorized domains updated:"
          jq -r '.authorizedDomains[] | "  - " + .' /tmp/fb_result.json

      - name: Package Cloud Function
        run: |
          cd services/api

          echo "📦 Creating optimized deployment package..."

          # Create deployment directory
          rm -rf .deployment
          mkdir -p .deployment

          # Install GCP-specific dependencies only
          echo "Installing GCP-specific dependencies..."
          pip install --target .deployment --no-cache-dir -r requirements-gcp.txt

          # Aggressive cleanup of unnecessary files
          echo "Cleaning up unnecessary files..."
          find .deployment -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find .deployment -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find .deployment -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find .deployment -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          find .deployment -type f -name "*.pyc" -delete 2>/dev/null || true
          find .deployment -type f -name "*.pyo" -delete 2>/dev/null || true
          # Note: .so files are C extension binaries and should NOT be deleted
          # find .deployment -type f -name "*.so" -delete 2>/dev/null || true

          # Remove test and documentation files
          find .deployment -type f -name "test_*.py" -delete 2>/dev/null || true
          find .deployment -type f -name "*_test.py" -delete 2>/dev/null || true
          find .deployment -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find .deployment -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

          # Copy application code
          cp -r app .deployment/
          # Rename function.py to main.py for Cloud Functions
          cp function.py .deployment/main.py
          cp requirements-gcp.txt .deployment/requirements.txt

          # Clean up app __pycache__
          find .deployment/app -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

          # Create ZIP package with maximum compression
          cd .deployment
          zip -r9 -q ../function-source.zip .
          cd ..

          echo "✅ Package created:"
          ls -lh function-source.zip
          PACKAGE_SIZE=$(du -h function-source.zip | cut -f1)
          PACKAGE_SIZE_KB=$(du -k function-source.zip | cut -f1)
          echo "📦 Package size: $PACKAGE_SIZE ($PACKAGE_SIZE_KB KB)"

          # Show size breakdown
          echo ""
          echo "📊 Top 10 largest items in package:"
          unzip -l function-source.zip | sort -k4 -n -r | head -n 11

      - name: Deploy Cloud Function
        id: deploy_function
        run: |
          # Use values from Pulumi outputs
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          FUNCTION_NAME="${{ steps.pulumi_outputs.outputs.function_name }}"
          FUNCTION_BUCKET="${{ steps.pulumi_outputs.outputs.function_source_bucket }}"
          REGION=${{ env.GCP_REGION }}

          echo "🚀 Deploying Cloud Function: $FUNCTION_NAME"
          echo "  Project: $PROJECT_ID"
          echo "  Bucket: $FUNCTION_BUCKET"
          echo "  Region: $REGION"

          # Upload source to GCS
          gsutil cp services/api/function-source.zip gs://$FUNCTION_BUCKET/function-source.zip

          # Get CDN IP from Pulumi outputs for CORS
          # GCP Classic HTTP LB serves over both HTTP and HTTPS
          CDN_URL="${{ steps.pulumi_outputs.outputs.cdn_ip_address }}"
          # Custom domain from config file (single source of truth)
          CUSTOM_DOMAIN="${{ steps.cloud_config.outputs.custom_domain }}"
          CORS_ORIGINS="http://${CDN_URL},https://${CDN_URL},http://localhost:5173"
          if [ -n "$CUSTOM_DOMAIN" ]; then
            CORS_ORIGINS="${CORS_ORIGINS},https://${CUSTOM_DOMAIN}"
          fi

          echo "🔒 CORS Origins: $CORS_ORIGINS"

          # Determine environment
          DEPLOY_ENV="${{ steps.set_stack.outputs.stack_name }}"
          # Auth is enabled in both staging and production (Firebase for GCP)
          AUTH_DISABLED_VALUE="false"
          UPLOADS_BUCKET="${{ steps.pulumi_outputs.outputs.uploads_bucket }}"

          # Create env vars file to avoid escaping issues with special characters
          echo "ENVIRONMENT: ${DEPLOY_ENV}" > /tmp/env-vars.yaml
          echo "CLOUD_PROVIDER: gcp" >> /tmp/env-vars.yaml
          echo "GCP_PROJECT_ID: $PROJECT_ID" >> /tmp/env-vars.yaml
          echo "GCP_POSTS_COLLECTION: posts" >> /tmp/env-vars.yaml
          echo "GCP_PROFILES_COLLECTION: profiles" >> /tmp/env-vars.yaml
          echo "AUTH_DISABLED: \"$AUTH_DISABLED_VALUE\"" >> /tmp/env-vars.yaml
          echo "AUTH_PROVIDER: firebase" >> /tmp/env-vars.yaml
          echo "GCP_STORAGE_BUCKET: $UPLOADS_BUCKET" >> /tmp/env-vars.yaml
          echo "GCP_SERVICE_ACCOUNT: ${{ steps.pulumi_outputs.outputs.compute_sa_email }}" >> /tmp/env-vars.yaml
          echo "CORS_ORIGINS: \"$CORS_ORIGINS\"" >> /tmp/env-vars.yaml

          echo "📝 Environment variables file created (ENVIRONMENT=$DEPLOY_ENV, AUTH_DISABLED=$AUTH_DISABLED_VALUE, AUTH_PROVIDER=firebase, GCP_STORAGE_BUCKET=$UPLOADS_BUCKET)"

          # Deploy function with env vars from file
          # Rate limiting: max 10 instances × 50 concurrent requests/instance = 500 total concurrent requests
          gcloud functions deploy $FUNCTION_NAME \
            --gen2 \
            --region=$REGION \
            --runtime=python313 \
            --source=gs://$FUNCTION_BUCKET/function-source.zip \
            --entry-point=handler \
            --trigger-http \
            --allow-unauthenticated \
            --min-instances=$([[ "${{ steps.set_stack.outputs.stack_name }}" == "staging" ]] && echo 0 || echo 1) \
            --max-instances=10 \
            --concurrency=50 \
            --memory=512MB \
            --timeout=60s \
            --env-vars-file=/tmp/env-vars.yaml

          # Get function URL
          FUNCTION_URL=$(gcloud functions describe $FUNCTION_NAME --region=$REGION --gen2 --format="value(serviceConfig.uri)")
          echo "api_url=$FUNCTION_URL" >> $GITHUB_OUTPUT

          echo "✅ Cloud Function deployed successfully"
          echo "  URL: $FUNCTION_URL"

      - name: Build and Deploy Frontend
        run: |
          FRONTEND_BUCKET="${{ steps.pulumi_outputs.outputs.frontend_bucket }}"
          API_URL="${{ steps.deploy_function.outputs.api_url }}"
          STACK_NAME="${{ steps.set_stack.outputs.stack_name }}"

          # Custom domain from config file (single source of truth)
          GCP_CUSTOM_DOMAIN="${{ steps.cloud_config.outputs.custom_domain }}"
          PUBLIC_HOST="${GCP_CUSTOM_DOMAIN}"

          echo "🏗️  Building React frontend for GCP ($STACK_NAME)..."
          echo "🌐 Public host: ${PUBLIC_HOST}"
          echo "🔗 API URL: ${API_URL}"
          cd services/frontend_react
          npm ci --prefer-offline

          VITE_AUTH_PROVIDER=firebase \
          VITE_API_URL="${API_URL}" \
          VITE_FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
          VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
          VITE_FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
          VITE_FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
          npx vite build --base=/sns/
          echo "✅ Build complete ($(du -sh dist | cut -f1))"
          cd ../..

          # Upload index.html with no-cache
          gsutil -h "Content-Type:text/html" \
            -h "Cache-Control:no-cache, no-store, must-revalidate" \
            cp services/frontend_react/dist/index.html \
            "gs://${FRONTEND_BUCKET}/sns/index.html"

          # Upload assets with immutable cache
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            cp -r services/frontend_react/dist/assets \
            "gs://${FRONTEND_BUCKET}/sns/"

          # Upload SVGs
          gsutil -m -h "Cache-Control:public, max-age=3600" \
            cp services/frontend_react/dist/*.svg \
            "gs://${FRONTEND_BUCKET}/sns/" 2>/dev/null || true

          echo "✅ Frontend deployed to gs://${FRONTEND_BUCKET}/sns/"

          # Invalidate Cloud CDN cache
          URLMAP_NAME=$(gcloud compute url-maps list --format="value(name)" | grep "${STACK_NAME}" | head -1)
          if [ -n "$URLMAP_NAME" ]; then
            gcloud compute url-maps invalidate-cdn-cache "$URLMAP_NAME" \
              --path "/sns/*" --async 2>/dev/null || true
            echo "✅ CDN cache invalidated: $URLMAP_NAME"
          fi

      - name: Notify Success
        if: success()
        run: |
          echo "✅ GCP deployment succeeded!"
          echo "📍 Function URL: ${{ steps.deploy_function.outputs.api_url }}"
          echo "🌐 Frontend Bucket: ${{ steps.pulumi_outputs.outputs.frontend_bucket }}"

      - name: Notify Failure
        if: failure()
        run: echo "❌ GCP deployment failed!"
