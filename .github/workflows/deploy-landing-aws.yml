name: Deploy Landing Page to AWS

on:
  push:
    branches:
      - develop # staging自動デプロイ
      - main # production自動デプロイ
    paths:
      - "static-site/**"
      - ".github/workflows/deploy-landing-aws.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ap-northeast-1

jobs:
  deploy-landing:
    name: Deploy Landing Page to AWS S3
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          # Use workflow_dispatch input if available, otherwise derive from branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "s3_bucket=multicloud-auto-deploy-production-frontend" >> $GITHUB_OUTPUT
            echo "cloudfront_id=E214XONKTXJEJD" >> $GITHUB_OUTPUT
            echo "url=https://www.aws.ashnova.jp/" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "s3_bucket=multicloud-auto-deploy-staging-frontend" >> $GITHUB_OUTPUT
            echo "cloudfront_id=E1TBH4R432SZBZ" >> $GITHUB_OUTPUT
            echo "url=https://staging.aws.ashnova.jp/" >> $GITHUB_OUTPUT
          fi
          echo "🌍 Deploying to: $ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync static-site/ s3://${{ steps.env.outputs.s3_bucket }}/ \
            --cache-control "public, max-age=3600" \
            --exclude "*" \
            --include "*.html"

      - name: Set AWS-specific landing page as root index.html
        run: |
          # Deploy aws/index.html as root index.html for AWS CloudFront
          aws s3 cp static-site/aws/index.html \
            s3://${{ steps.env.outputs.s3_bucket }}/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.env.outputs.cloudfront_id }} \
            --paths "/*" \
            --no-cli-pager

      - name: Deployment Success
        run: |
          echo "✅ Landing page deployed to ${{ steps.env.outputs.environment }} successfully!"
          echo "🌐 URL: ${{ steps.env.outputs.url }}"
