name: "Bug Report"
description: "Report a bug or broken behavior"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in all fields. Check [AI_AGENT_06_STATUS.md](../docs/AI_AGENT_06_STATUS.md)
        first to confirm this is not a known issue.

  - type: dropdown
    id: cloud
    attributes:
      label: "Affected Cloud"
      options:
        - AWS
        - Azure
        - GCP
        - All clouds
        - Local / CI only
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "Environment"
      options:
        - staging
        - production
        - local
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      placeholder: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Call `GET /posts` on ...
        2. Observe error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs / Error Messages"
      render: text

  - type: input
    id: workflow_run
    attributes:
      label: "GitHub Actions Run ID (if CI/CD related)"
